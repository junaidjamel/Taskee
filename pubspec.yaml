name: taskee
description: "A task management app built with Flutter, Hive, and Bloc for efficient state management and local data storage."
# The following line prevents the package from being accidentally published to

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  go_router: ^17.2.3
  get_it: ^9.2.1
  google_fonts: ^8.1.0

dev_dependencies:
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
