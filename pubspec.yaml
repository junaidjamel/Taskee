name: taskee
description: "A task management app built with Flutter, Hive, and Bloc for efficient state management and local data storage."
# The following line prevents the package from being accidentally published to

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  go_router: ^17.2.3
  get_it: ^9.2.1
  google_fonts: ^8.1.0
  flutter_card_swiper: ^7.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
